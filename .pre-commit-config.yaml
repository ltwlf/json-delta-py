repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies: []
        args: [--strict]
        pass_filenames: false
        entry: mypy src/

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest tests/ -q
        language: system
        pass_filenames: false
        always_run: true
